<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Musika – Print</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #555; font-family: -apple-system, sans-serif; }
  .toolbar { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; gap: 8px; }
  .toolbar button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: #ff3864; color: white; }
  .toolbar button.secondary { background: white; color: #333; }

  .sheet {
    width: 210mm; height: 297mm; background: white; margin: 16px auto;
    padding: 22.5mm 10.5mm;
    display: grid; grid-template-columns: repeat(3, 63mm); grid-template-rows: repeat(4, 63mm);
    gap: 0; position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    page-break-after: always; break-after: page; overflow: hidden;
  }
  .sheet:last-child { page-break-after: auto; break-after: auto; }
  .sheet-label { position: absolute; top: 8mm; left: 10.5mm; font-size: 9pt; color: #aaa; }

  .card {
    width: 63mm; height: 63mm; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; font-family: -apple-system, system-ui, sans-serif;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    outline: 0.5px dashed #d5d5d5; outline-offset: -0.25px;
  }
  .card.empty { background: transparent !important; }

  /* ============ FRONT — vinyl rings on black ============ */
  .card.front { background: #0a0a0a; }
  .card.front .rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .card.front .ring { position: absolute; border-radius: 50%; border-style: solid; border-width: 1.4mm; }
  .card.front .r1 { width: 60mm; height: 60mm; }
  .card.front .r2 { width: 52mm; height: 52mm; }
  .card.front .r3 { width: 44mm; height: 44mm; }
  .card.front .r4 { width: 36mm; height: 36mm; }

  /* Category ring palettes */
  .card.front.dansk .r1 { border-color: #ff2d6f; }
  .card.front.dansk .r2 { border-color: #ffd400; }
  .card.front.dansk .r3 { border-color: #00c2ff; }
  .card.front.dansk .r4 { border-color: #ffffff; }
  .card.front.international .r1 { border-color: #ff00aa; }
  .card.front.international .r2 { border-color: #00ffd1; }
  .card.front.international .r3 { border-color: #ffaa00; }
  .card.front.international .r4 { border-color: #aa55ff; }
  .card.front.disney .r1 { border-color: #5fc8ff; }
  .card.front.disney .r2 { border-color: #ffd700; }
  .card.front.disney .r3 { border-color: #b69cff; }
  .card.front.disney .r4 { border-color: #ffffff; }
  .card.front.film .r1 { border-color: #ff6b35; }
  .card.front.film .r2 { border-color: #f7c548; }
  .card.front.film .r3 { border-color: #c70039; }
  .card.front.film .r4 { border-color: #ffffff; }

  .card.front .cat-tag {
    position: absolute; top: 3mm; left: 0; right: 0; text-align: center;
    font-size: 6pt; font-weight: 700; letter-spacing: 3px;
    color: rgba(255,255,255,0.7); z-index: 3;
  }
  .card.front .qr-wrap {
    position: relative; background: white; padding: 1.8mm; border-radius: 1mm;
    z-index: 2; box-shadow: 0 0 0 0.5mm #0a0a0a, 0 1.5mm 4mm rgba(0,0,0,0.5);
    display: inline-block; line-height: 0;
  }
  .card.front .qr-wrap canvas { display: none !important; }
  .card.front .qr-wrap img { display: block !important; width: 26mm !important; height: 26mm !important; }
  .card.front .playlist-name {
    position: absolute; bottom: 7mm; left: 4mm; right: 4mm;
    text-align: center; font-size: 8.5pt; font-weight: 800;
    color: white; line-height: 1.15; z-index: 3;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    max-height: 8mm; overflow: hidden;
  }
  .card.front .brand {
    position: absolute; bottom: 2mm; left: 0; right: 0; text-align: center;
    font-size: 7pt; font-weight: 900; letter-spacing: 4px;
    color: rgba(255,255,255,0.85); z-index: 3;
  }

  /* ============ BACK — decade-based hue per category ============ */
  .card.back { padding: 6mm 5mm; }
  .card.back .artist {
    position: absolute; top: 6mm; left: 5mm; right: 5mm;
    text-align: center; font-size: 10.5pt; font-weight: 700;
    line-height: 1.15; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .card.back .year-wrap { display: flex; align-items: center; justify-content: center; }
  .card.back .year {
    font-size: 44pt; font-weight: 900; letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1;
  }
  .card.back .title {
    position: absolute; bottom: 6mm; left: 5mm; right: 5mm;
    text-align: center; font-size: 9pt; font-style: italic;
    font-weight: 500; line-height: 1.2; opacity: 0.95;
  }
  .card.back .divider-top, .card.back .divider-bottom {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 12mm; height: 0.4mm; background: rgba(255,255,255,0.5);
  }
  .card.back .divider-top { top: 14mm; }
  .card.back .divider-bottom { bottom: 14mm; }
  .card.back .decade-tag {
    position: absolute; bottom: 2mm; left: 0; right: 0; text-align: center;
    font-size: 6pt; font-weight: 700; letter-spacing: 2px;
    color: rgba(255,255,255,0.55);
  }

  @media print {
    body { background: white; }
    .toolbar { display: none; }
    .sheet { margin: 0; box-shadow: none; }
    .sheet-label { display: none; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">🖨️ Print</button>
  <button class="secondary" onclick="window.close()">Luk</button>
</div>

<div id="sheets"></div>

<script>
const CARDS_PER_PAGE = 12, COLS = 3, ROWS = 4;
const QR_BASE = 'https://open.spotify.com/track/{spotify_id}';

// ============================================================
// DECADE COLORS — each category has its own hue family
// Lighter for older decades, darker/more saturated for newer
// ============================================================
const DECADE_COLORS = {
  dansk: {
    // Red/burgundy family — soft pink (1900s) → deep crimson (2020s)
    1900: ['#f5d5dc', '#c9404e'], 1910: ['#f0c2cb', '#c33648'],
    1920: ['#ecaeb9', '#bd2c41'], 1930: ['#e69ba8', '#b62339'],
    1940: ['#df8696', '#af1a32'], 1950: ['#d97286', '#a8112b'],
    1960: ['#d35e75', '#a10824'], 1970: ['#cd4a64', '#9a001d'],
    1980: ['#c63653', '#8e001a'], 1990: ['#bf2243', '#820017'],
    2000: ['#b80e34', '#760014'], 2010: ['#a8002b', '#5e0010'],
    2020: ['#990024', '#4a000c'],
  },
  international: {
    // Purple/violet family
    1900: ['#e0d4ee', '#7d4ba8'], 1910: ['#d6c3e7', '#7541a0'],
    1920: ['#cdb3e1', '#6e3899'], 1930: ['#c4a3da', '#672e91'],
    1940: ['#bb93d4', '#60258a'], 1950: ['#b283cd', '#591b82'],
    1960: ['#a973c7', '#52127b'], 1970: ['#a063c0', '#4b0973'],
    1980: ['#9853ba', '#44006c'], 1990: ['#8f43b3', '#3e0064'],
    2000: ['#8633ad', '#37005d'], 2010: ['#7d23a6', '#300055'],
    2020: ['#74139f', '#29004e'],
  },
  disney: {
    // Blue family — light sky blue (1900s) → deep navy (2020s) like Disney+ logo
    1900: ['#cfe6f5', '#5fa8d8'], 1910: ['#bedceb', '#4f9bd0'],
    1920: ['#add3e2', '#3f8fc8'], 1930: ['#9cc9d8', '#3082c0'],
    1940: ['#8bbfcf', '#2076b9'], 1950: ['#7ab5c5', '#1069b1'],
    1960: ['#69abbc', '#005ca8'], 1970: ['#58a1b3', '#0052a0'],
    1980: ['#4796a9', '#004897'], 1990: ['#368c9f', '#003e8e'],
    2000: ['#258296', '#003485'], 2010: ['#14778c', '#002a7d'],
    2020: ['#036d83', '#002074'],
  },
  film: {
    // Orange/amber/gold family — like cinematic golden hour
    1900: ['#f9e4c8', '#d68a3f'], 1910: ['#f6d8b3', '#cd7f37'],
    1920: ['#f3cb9d', '#c47430'], 1930: ['#f0bf88', '#bb6928'],
    1940: ['#edb273', '#b25e21'], 1950: ['#eaa65d', '#a95319'],
    1960: ['#e79948', '#a04812'], 1970: ['#e48d33', '#973d0a'],
    1980: ['#d8801e', '#893500'], 1990: ['#c8740c', '#7c2f00'],
    2000: ['#b86800', '#6f2900'], 2010: ['#a85c00', '#622300'],
    2020: ['#985000', '#551d00'],
  },
};

function decadeOf(year) {
  return Math.floor(year / 10) * 10;
}

function backStyle(category, year) {
  const decades = DECADE_COLORS[category] || DECADE_COLORS.international;
  const decade = decadeOf(year);
  const colors = decades[decade] || decades[1980];
  const [c1, c2] = colors;
  return `background: radial-gradient(circle at 30% 20%, ${hexToRgba(c1, 0.4)} 0%, transparent 60%), linear-gradient(135deg, ${c1} 0%, ${c2} 100%);`;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildUrl(t) { return QR_BASE.replace('{spotify_id}', t.spotify_id).replace('{card_id}', t.card_id); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function makeEmpty() { const el = document.createElement('div'); el.className = 'card empty'; return el; }

const CATEGORY_LABELS = {
  dansk: 'DANSK',
  international: 'INTERNATIONALT',
  disney: 'DISNEY',
  film: 'FILMMUSIK',
};

function makeFront(t, cat, playlistName) {
  const c = document.createElement('div');
  c.className = `card front ${cat}`;
  const catLabel = CATEGORY_LABELS[cat] || cat.toUpperCase();
  c.innerHTML = `
    <div class="cat-tag">${catLabel}</div>
    <div class="rings">
      <div class="ring r1"></div><div class="ring r2"></div>
      <div class="ring r3"></div><div class="ring r4"></div>
    </div>
    <div class="qr-wrap"><div class="qr"></div></div>
    <div class="playlist-name">${escapeHtml(playlistName)}</div>
    <div class="brand">MUSIKA</div>
  `;
  new QRCode(c.querySelector('.qr'), { text: buildUrl(t), width: 104, height: 104, correctLevel: QRCode.CorrectLevel.M });
  return c;
}

function makeBack(t, cat) {
  const c = document.createElement('div');
  c.className = `card back ${cat}`;
  c.setAttribute('style', backStyle(cat, t.year));
  const decade = decadeOf(t.year);
  c.innerHTML = `
    <div class="artist">${escapeHtml(t.artist)}</div>
    <div class="divider-top"></div>
    <div class="year-wrap"><div class="year">${escapeHtml(t.year)}</div></div>
    <div class="divider-bottom"></div>
    <div class="title">${escapeHtml(t.title)}</div>
    <div class="decade-tag">${decade}'ERNE</div>
  `;
  return c;
}

function render() {
  const raw = sessionStorage.getItem('tl_print_payload');
  if (!raw) {
    document.getElementById('sheets').innerHTML = '<p style="color:white; padding:40px; text-align:center;">Ingen data — åbn denne side via admin-interfacet.</p>';
    return;
  }
  const payload = JSON.parse(raw);
  const { category, tracks } = payload;
  const playlistName = payload.playlistName || payload.categoryLabel || '';
  const sheets = document.getElementById('sheets');

  for (let i = 0; i < tracks.length; i += CARDS_PER_PAGE) {
    const page = tracks.slice(i, i + CARDS_PER_PAGE);
    const pageNum = Math.floor(i / CARDS_PER_PAGE) + 1;

    const front = document.createElement('div');
    front.className = 'sheet';
    front.innerHTML = `<div class="sheet-label">Side ${pageNum} – Fronter (QR)</div>`;
    page.forEach(t => front.appendChild(makeFront(t, category, playlistName)));
    for (let j = page.length; j < CARDS_PER_PAGE; j++) front.appendChild(makeEmpty());
    sheets.appendChild(front);

    const back = document.createElement('div');
    back.className = 'sheet';
    back.innerHTML = `<div class="sheet-label">Side ${pageNum} – Bagsider</div>`;
    const rows = [];
    for (let r = 0; r < ROWS; r++) {
      const row = page.slice(r * COLS, r * COLS + COLS);
      while (row.length < COLS) row.push(null);
      rows.push(row.reverse());
    }
    rows.flat().forEach(t => back.appendChild(t ? makeBack(t, category) : makeEmpty()));
    sheets.appendChild(back);
  }
}

render();
</script>
</body>
</html>
